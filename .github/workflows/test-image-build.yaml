name: Test Image Build

on:
  pull_request:
    paths:
      - .github/workflows/test-image-build.yaml
      - .github/actions/setup-environment/**
      - build/**
      - tests/**
      - pyproject.toml
      - uv.lock

jobs:
  test-image-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Set up Python environment
        uses: ./.github/actions/setup-environment
      - name: Verify Podman is available
        run: podman --version
      - name: Allow pushing to the insecure test registry
        run: |
          sudo mkdir -p /etc/containers/registries.conf.d
          sudo tee /etc/containers/registries.conf.d/localhost-insecure.conf >/dev/null <<'EOF'
          [[registry]]
          location = "localhost:5000"
          insecure = true
          EOF
      - name: Install dependencies
        run: |
          uv sync --group dev
      - name: Run tests with pytest
        run: |
          uv run pytest --cov build --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}